services:
  db:
    image: postgres:16
    container_name: retro_reels_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retro_reels
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  be:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: retro_reels_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/retro_reels"
      JWT_SECRET: "Retro_Reels"
    depends_on:
      db:
        condition: service_healthy

  fe:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: retro_reels_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - be

volumes:
  postgres_data:
